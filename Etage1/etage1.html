<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musée des projets - Étage I</title>
    <link rel="stylesheet" href="style1.css" />
</head>

<body>

    <header class="main-header">
        <div class="menu-stack">
            <div class="menu-items" id="menu-items">
<!-- Dans Etage1/etage1.html -->
            <a href="../bio/bio.html" class="floor-dot" data-label="Biographie">-1</a>
            <a href="../index.html" class="floor-dot" data-label="Accueil">0</a>
            <a href="etage1.html" class="floor-dot active" data-label="Étage 1">I</a>
            <a href="../Etage2/etage2.html" class="floor-dot" data-label="Étage 2">II</a>                <a href="#" class="floor-dot disabled" data-label="Étage 3">III</a>

            </div>

            <div class="menu-main-button" id="menu-toggle">
                <div class="burger-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <div class="header-titles">
            <div id="category-title">PROJETS COMPLETS</div>
            <div class="floor-era">]2025 ; 2026]</div>
        </div>
    </header>
    <div id="scroll-hint">
        <div class="mouse">
            <div class="wheel"></div>
        </div>
        <p>Scrollez pour explorer</p>
    </div>
    <main class="scene">
        <div class="ring" id="ring">

            <div class="divider red" data-category="PROJETS COMPLETS" data-title="COMPLETS"></div>
            <div class="card" data-title="Mon Portfolio" data-img="./image/photo.png"
                data-desc="Un aperçu complet de mon travail de designer."></div>
            <div class="card" data-title="Identité Visuelle" data-img="img2.jpg"
                data-desc="Création d'une charte graphique moderne."></div>
            <div class="card" data-title="UI Design" data-img="img3.jpg"
                data-desc="Interface pour une application de gestion."></div>
            <div class="card" data-title="Illustration" data-img="img1.jpg"
                data-desc="Série d'illustrations vectorielles."></div>
                
            <div class="divider blue" data-category="PROJETS INCOMPLETS" data-title="EN COURS"></div>
            <div class="card" data-title="Projet Mobile" data-img="img1.jpg"
                data-desc="Développement d'une application React Native."></div>
            <div class="card" data-title="Site E-commerce" data-img="img2.jpg"
                data-desc="Maquette pour une boutique de mode."></div>
            <div class="card" data-title="Refonte Web" data-img="img3.jpg"
                data-desc="Modernisation d'un site institutionnel."></div>
            <div class="card" data-title="Branding" data-img="img1.jpg" data-desc="Recherche de logo pour une startup.">
            </div>

            <div class="divider green" data-category="PROJET DIVERS" data-title="ARCHIVES"></div>
            <div class="card" data-title="Projet 2023" data-img="img1.jpg" data-desc="Ancien projet de fin d'études.">
            </div>
            <div class="card" data-title="Sketchbook" data-img="img2.jpg" data-desc="Carnet de croquis numériques.">
            </div>
            <div class="card" data-title="Motion Design" data-img="img3.jpg"
                data-desc="Animation de 30 secondes pour les réseaux."></div>
            <div class="card" data-title="Typographie" data-img="img1.jpg"
                data-desc="Expérimentations sur les polices de caractères."></div>

        </div>
        <div id="ring-cursor">
            <div class="cursor-arrow"></div>
        </div>
    </main>

    <aside id="info-sidebar">
        <div class="info-content">
            <div class="info-header">
                <span class="info-label">FOCUS</span>
                <span id="side-year" class="info-year">2026</span>
            </div>
            <h3 id="side-title">—</h3>
            <p id="side-category">Défilez pour explorer</p>
            <div class="info-indicator">
                <div id="progress-bar"></div>
            </div>
        </div>
    </aside>
    <div id="overlay"></div>

    <div id="project-detail">
        <div class="popup-container">
            <div class="popup-image-side">
                <img id="project-img" src="" alt="Aperçu du projet">
            </div>
            <div class="popup-info-side">
                <h2 id="project-title">Titre du Projet</h2>
                <div class="popup-divider"></div>
                <p id="project-desc">Description détaillée ici...</p>
                <button class="close-btn" onclick="closePopup()">FERMER</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script1.js"></script>
</body>

</html>
