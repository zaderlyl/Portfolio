<body>

    <header class="main-header">
        <div class="menu-stack">
            <div class="menu-items" id="menu-items">
                <a href="../bio/bio.html" class="floor-dot disabled" data-label="Étage 2">-1</a>
                <a href="../index.html" class="floor-dot" data-label="Accueil">0</a>
                <a href="etage1.html" class="floor-dot active" data-label="Étage 1">I</a>
                <a href="../Etage2/etage2.html" class="floor-dot disabled" data-label="Étage 2">II</a>
                <a href="#" class="floor-dot disabled" data-label="Étage 3">III</a>

                    <span></span>

                    <span></span>
                </div>

        <div class="header-titles">
            <div id="category-title">PROJETS COMPLETS</div>
            <div class="floor-era">]2025 ; 2026]</div>
        </div>
    </header>

    <div id="scroll-hint">
        <div class="mouse">
            <div class="wheel"></div>
        </div>
        <p>Scrollez pour explorer</p>
    </div>

    <main class="scene">
        <div class="ring" id="ring">

            <div class="divider red" data-category="PROJETS COMPLETS" data-title="COMPLETS"></div>
            <div class="card" data-title="Mon Portfolio"
                data-img="../image/portfolio.png,../image/portfolio2.png,../image/portfolio3.png"
                data-desc="Site Web recensant la majeure partie de mes productions et produits personnels.">
            </div>
            <div class="card" data-title="Jack & Scie – Identité Visuelle (SAÉ 103)"
                data-img="../image/Identité_Visuelle_Perso.png,../image/LogoFinal.png,../image/Declinaison.png"
                data-desc="Dans le cadre de ce projet d'étude portant sur une marque fictive, j'ai conçu l'intégralité de l'univers visuel d'un artisan bûcheron. J'ai réalisé le logotype (fusion d'une bûche et d'une hache), sa symbolique et ses déclinaisons typographiques. J'ai également produit tous les éléments graphiques et structuré la charte graphique complète, incluant les teintes organiques et les supports digitaux (Instagram, Web).">
            </div>
            <div class="card" data-title="Newsletter MMI & CO. – IUT de Béziers" 
                data-img="../image/newsL1.png,../image/newsL2.png,../image/newsL3.png,../image/newsL4.png"
                data-desc="Réalisation d’une newsletter fictive (16/11/2025) simulant un compte-rendu du forum « Go Études Sup ! ». Ce projet met en avant l'Espace Michel Serres, ses ressources physiques et ses modes de consultation numérique. Le support inclut une synthèse technique sur le Machine Learning , un jeu de mots-croisés pédagogique pour tester les connaissances et se conclut par une bibliographie normée exhaustive sur les langages de programmation."></div>
            
            <div class="card" data-title="Illustration" data-img="img1.jpg"
                data-desc="Série d'illustrations vectorielles."></div>
                
            <div class="divider blue" data-category="PROJETS INCOMPLETS" data-title="EN COURS"></div>
            <div class="card" data-title="Projet Mobile" data-img="img1.jpg"
                data-desc="Développement d'une application React Native."></div>
            <div class="card" data-title="Site E-commerce" data-img="img2.jpg"
                data-desc="Maquette pour une boutique de mode."></div>
            <div class="card" data-title="Refonte Web" data-img="img3.jpg"
                data-desc="Modernisation d'un site institutionnel."></div>
            <div class="card" data-title="Branding" data-img="img1.jpg"
                data-desc="Recherche de logo pour une startup."></div>

            <div class="divider green" data-category="PROJET DIVERS" data-title="ARCHIVES"></div>
            <div class="card" data-title="Projet 2023" data-img="img1.jpg"
                data-desc="Ancien projet de fin d'études."></div>
            <div class="card" data-title="Sketchbook" data-img="img2.jpg"
                data-desc="Carnet de croquis numériques."></div>
            <div class="card" data-title="Motion Design" data-img="img3.jpg"
                data-desc="Animation de 30 secondes pour les réseaux."></div>
            <div class="card" data-title="Typographie" data-img="img1.jpg"
                data-desc="Expérimentations sur les polices de caractères."></div>

        </div>
        <div id="ring-cursor">
            <div class="cursor-arrow"></div>
        </div>
    </main>

    <aside id="info-sidebar">
        <div class="info-content">
            <div class="info-header">
                <span class="info-label">FOCUS</span>
                <span id="side-year" class="info-year">2026</span>
            </div>
            <h3 id="side-title">—</h3>
            <p id="side-category">Défilez pour explorer</p>
            <div class="info-indicator">
                <div id="progress-bar"></div>
            </div>
        </div>
    </aside>

    <div id="overlay"></div>

    <div id="project-detail">
        <div class="popup-container">

            <!-- SIDE IMAGE : CAROUSEL -->
            <div class="popup-image-side">
                <div class="carousel" id="carousel">
                    <div class="carousel-track" id="carousel-track"></div>

                    <button class="carousel-btn carousel-btn--prev" id="carousel-prev" aria-label="Image précédente">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button class="carousel-btn carousel-btn--next" id="carousel-next" aria-label="Image suivante">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>

                    <div class="carousel-counter" id="carousel-counter">1 / 1</div>
                    <div class="carousel-dots" id="carousel-dots"></div>
                </div>
            </div>

            <!-- SIDE INFO -->
            <div class="popup-info-side">
                <h2 id="project-title">Titre du Projet</h2>
                <div class="popup-divider"></div>

                <!-- Wrapper pour le fondu de scroll -->
                <div class="desc-wrapper">
                    <p id="project-desc">Description détaillée ici...</p>
                </div>

                <button class="close-btn" onclick="closePopup()">FERMER</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
